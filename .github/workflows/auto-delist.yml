name: auto-delist

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]
    paths:
      - "eikons/**"
      - "packages/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-delist:
    if: "${{ startsWith(github.event.pull_request.title, 'eikons: delist ') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: oven-sh/setup-bun@v2
      - run: bun scripts/auto-delist.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
