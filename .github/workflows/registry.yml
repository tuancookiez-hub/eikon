name: registry

on:
  push:
    branches: [main]
    paths: ["eikons/**", "packages/**", "src/registry.ts", "src/publish.ts", "src/cli.tsx", "src/ui/**"]
  pull_request:
    paths: ["eikons/**", "packages/**", "src/registry.ts", "src/publish.ts", "src/cli.tsx", "src/ui/**", "scripts/registry-pr-check.ts"]

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -e
          for f in $(git diff --name-only origin/main...HEAD -- 'eikons/*/*.eikon' 'eikons/*/manifest.json'); do
            bun src/cli.tsx lint "$f"
          done
          bun src/cli.tsx manifest --gzip
          EIKON_REGISTRY=1 bun src/cli.tsx index
          bun run verify:artifacts
          bun run verify:registry-pr

  index:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun src/cli.tsx manifest --gzip
      - run: bun src/cli.tsx index
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eikons/ packages/
          git diff --cached --quiet || git commit -m "chore(eikons): regenerate registry artifacts"
          git push
