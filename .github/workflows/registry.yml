name: registry

on:
  push:
    branches: [main]
    paths: ["eikons/**", "src/registry.ts", "src/ui/**"]
  pull_request:
    paths: ["eikons/**"]

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: |
          set -e
          for f in $(git diff --name-only origin/main...HEAD -- 'eikons/*/*.eikon' 'eikons/*/manifest.json'); do
            bun src/cli.tsx lint "$f"
          done
          EIKON_REGISTRY=1 bun src/cli.tsx index
          git diff --exit-code -- eikons/index.json 'eikons/*/*.eikon'

  index:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun src/cli.tsx index
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eikons/
          git diff --cached --quiet || git commit -m "chore(eikons): regenerate index + source_url"
          git push
